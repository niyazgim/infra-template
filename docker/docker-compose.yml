name: my-main-stack

include:
  - first-path-to-the-docker-compose-file.yml
  - second-path-to-the-docker-compose-file.yml

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=80"
      # Uncomment for HTTPS
      # - "--entrypoints.websecure.address=443"
      # - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      # - "--certificatesresolvers.myresolver.acme.email=your-email@example.com"
      # - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--api.insecure=${TRAEFIK_API_INSECURE:-false}"
    ports:
      - "80:80"
      # - "443:443"   # Uncomment for HTTPS
      # - "8080:8080" # For dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # - "./letsencrypt:/letsencrypt" # for certs storing
    networks:
      - main-network   # WARNING: network name need to be the same in child compose files 

networks:
  main-network:
    driver: bridge